<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Look Amazing | Matej Smutný</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&display=swap" rel="stylesheet">

  <style>

    body {
      margin: 0;
      background: #050505;
      color: white;
      font-family: 'Inter', sans-serif;

      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }

    /* 🔙 BACK */
    .back {
      position: fixed;
      top: 30px;
      left: 30px;
      font-size: 13px;
      opacity: 0.4;
      text-decoration: none;
      color: white;
    }

    .back:hover {
      opacity: 1;
    }

    /* WRAP */
    .wrap {
      max-width: 500px;
    }

    /* TITLE */
    h1 {
      font-size: 22px;
      letter-spacing: 10px;
      font-weight: 400;
      margin-bottom: 30px;
      text-transform: uppercase;
    }

    /* DATE */
    .date {
      font-size: 13px;
      letter-spacing: 3px;
      opacity: 0.5;
      margin-bottom: 40px;
    }

    /* TEXT */
    .coming {
      font-size: 14px;
      opacity: 0.6;
      margin-bottom: 50px;
    }

    /* BUTTON */
    .btn {
      display: inline-block;
      padding: 12px 26px;
      border: 1px solid white;
      border-radius: 999px;
      text-decoration: none;
      color: white;
      font-size: 13px;
      letter-spacing: 2px;
      transition: 0.3s;
    }

    .btn:hover {
      background: white;
      color: black;
    }

  </style>
</head>

<body>

<a href="index.html#discography" class="back">← discography</a>

<div class="wrap">

  <h1>LOOK AMAZING</h1>

  <div class="date">OUT APRIL 10</div>

  <div class="coming">
    not out yet  
    <br><br>
    wait for it.
  </div>

  <a href="https://blmdi.to/look_amazing" target="_blank" class="btn">
    pre-save
  </a>

</div>

</body>
</html>

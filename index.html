<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Matej Smutný</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: black;
      color: white;
      text-align: center;
    }

    .hero {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    h1 {
      font-size: 60px;
      margin: 0;
    }

    p {
      opacity: 0.7;
    }

    .button {
      margin-top: 20px;
      padding: 10px 20px;
      border: 1px solid white;
      text-decoration: none;
      color: white;
    }

    .button:hover {
      background: white;
      color: black;
    }
  </style>
</head>

<body>

  <div class="hero">
    <h1>Matej Smutný</h1>
    <p>New release out now</p>

    <a class="button" href="https://open.spotify.com" target="_blank">
      Listen on Spotify
    </a>
  </div>

</body>
</html>
